<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/jpg" href="profil.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YFA</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        .bg {
            position: fixed;
            inset: 0;
            background: url('src/pp.jpg') center center / cover no-repeat;
            z-index: 0;
        }

        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, rgba(10,8,20,0.72) 0%, rgba(30,15,40,0.65) 40%, rgba(10,10,25,0.78) 100%);
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
        }
        .orb-1 { width: 380px; height: 380px; background: rgba(180,120,255,0.18); top: -80px; right: -80px; }
        .orb-2 { width: 300px; height: 300px; background: rgba(80,160,255,0.14); bottom: 60px; left: -60px; }
        .orb-3 { width: 200px; height: 200px; background: rgba(255,180,100,0.10); top: 50%; left: 50%; transform: translate(-50%,-50%); }

        .wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 460px;
            padding: 56px 24px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-wrap {
            position: relative;
            margin-bottom: 24px;
            animation: fadeUp 0.9s ease both;
        }

        .avatar-glow {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(180,120,255,0.7), rgba(80,160,255,0.7), rgba(255,180,100,0.5), rgba(180,120,255,0.7));
            animation: spinGlow 4s linear infinite;
            filter: blur(4px);
            z-index: 0;
        }

        @keyframes spinGlow { to { transform: rotate(360deg); } }

        .avatar-ring {
            position: relative;
            z-index: 1;
            width: 108px;
            height: 108px;
            border-radius: 50%;
            padding: 3px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(6px);
        }

        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #a078c8, #5090d8);
        }

        .avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeUp 0.9s 0.1s ease both;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: #ffffff;
            text-shadow: 0 2px 24px rgba(180,120,255,0.4);
            margin-bottom: 10px;
        }

        .typing-wrap {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            height: 20px;
        }

        .typing-text {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: rgba(220,200,255,0.75);
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typeIn 3.9s steps(24) 0.9s forwards;
        }

        .cursor {
            display: inline-block;
            width: 1.5px;
            height: 13px;
            background: rgba(180,120,255,0.9);
            animation: blink 0.75s step-end infinite;
            flex-shrink: 0;
        }

        @keyframes typeIn { to { width: 22ch; } }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

        .link-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* Wrapper buat tooltip bisa overflow */
        .link-wrap {
            position: relative;
            width: 100%;
        }

        /* Tooltip popup */
        .tooltip {
            position: absolute;
            top: -42px;
            left: 50%;
            transform: translateX(-50%) translateY(6px);
            background: rgba(20,14,35,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.65rem;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.85);
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }

        .tooltip::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 8px;
            height: 8px;
            background: rgba(20,14,35,0.92);
            border-right: 1px solid rgba(255,255,255,0.18);
            border-bottom: 1px solid rgba(255,255,255,0.18);
        }

        .link-wrap:hover .tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0px);
        }

        /* Per-color tooltip glow */
        .link-wrap[data-color="spotify"] .tooltip   { border-color: rgba(29,185,84,0.4);  color: rgba(100,255,140,0.9); }
        .link-wrap[data-color="whatsapp"] .tooltip  { border-color: rgba(37,211,102,0.4); color: rgba(100,255,140,0.9); }
        .link-wrap[data-color="instagram"] .tooltip { border-color: rgba(225,48,108,0.4); color: rgba(255,140,180,0.9); }
        .link-wrap[data-color="tiktok"] .tooltip    { border-color: rgba(255,255,255,0.3); color: rgba(220,220,255,0.9); }

        .link-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 15px 20px;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 50px;
            text-decoration: none;
            color: rgba(255,255,255,0.9);
            font-family: 'DM Mono', monospace;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: all 0.32s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            width: 100%;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Shimmer sweep */
        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.09), transparent);
            transition: left 0.5s ease;
            z-index: 1;
        }

        .link-item:hover::before { left: 140%; }

        .link-item:hover {
            background: rgba(255,255,255,0.14);
            border-color: rgba(255,255,255,0.32);
            transform: translateY(-5px) scale(1.05);
            box-shadow:
                0 2px 0 rgba(255,255,255,0.12) inset,
                0 16px 48px rgba(0,0,0,0.4),
                0 6px 20px rgba(180,120,255,0.18);
        }

        .link-item:active {
            transform: translateY(-1px) scale(0.98) !important;
            transition: all 0.08s ease !important;
        }

        .link-item.visible { animation: slideIn 0.55s ease forwards; }

        .link-wrap[data-color="spotify"]   .link-item:hover { box-shadow: 0 2px 0 rgba(255,255,255,0.1) inset, 0 16px 48px rgba(29,185,84,0.35),   0 6px 24px rgba(29,185,84,0.25);  border-color: rgba(29,185,84,0.55); background: rgba(29,185,84,0.1); }
        .link-wrap[data-color="whatsapp"]  .link-item:hover { box-shadow: 0 2px 0 rgba(255,255,255,0.1) inset, 0 16px 48px rgba(37,211,102,0.35),  0 6px 24px rgba(37,211,102,0.25); border-color: rgba(37,211,102,0.55); background: rgba(37,211,102,0.08); }
        .link-wrap[data-color="instagram"] .link-item:hover { box-shadow: 0 2px 0 rgba(255,255,255,0.1) inset, 0 16px 48px rgba(225,48,108,0.35),  0 6px 24px rgba(225,48,108,0.25); border-color: rgba(225,48,108,0.55); background: rgba(225,48,108,0.08); }
        .link-wrap[data-color="tiktok"]    .link-item:hover { box-shadow: 0 2px 0 rgba(255,255,255,0.1) inset, 0 16px 48px rgba(255,255,255,0.2),  0 6px 24px rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.1); }

        .icon-wrap {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .link-item:hover .icon-wrap {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.35);
            transform: scale(1.1) rotate(-5deg);
        }
        .icon-wrap svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.85); }

        .link-label { flex: 1; position: relative; z-index: 1; }

        /* Arrow muncul saat hover */
        .link-arrow {
            font-size: 0.85rem;
            opacity: 0;
            transform: translateX(-6px);
            transition: all 0.25s ease;
            color: rgba(255,255,255,0.6);
            position: relative;
            z-index: 1;
        }
        .link-item:hover .link-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            margin: 36px 0 0;
            opacity: 0;
            animation: fadeUp 0.5s 1.3s ease both;
        }

        .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.12); }
        .divider-diamond { width: 5px; height: 5px; background: rgba(180,120,255,0.7); transform: rotate(45deg); flex-shrink: 0; }

        footer {
            margin-top: 28px;
            font-size: 0.62rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            opacity: 0;
            animation: fadeUp 0.5s 1.5s ease both;
            padding-bottom: 8px;
        }

        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slideIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        @media (max-width: 480px) {
            .wrapper { padding: 48px 20px 40px; }
            h1 { font-size: 1.9rem; }
            .link-item { padding: 13px 18px; }
        }
    </style>
</head>
